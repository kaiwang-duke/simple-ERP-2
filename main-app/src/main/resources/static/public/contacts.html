<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact List</title>
  <script>
    async function fetchContacts() {
      const response = await fetch('/contacts');
      const contacts = await response.json();
      displayContacts(contacts);
    }

    async function searchContacts() {
      const keyword = document.getElementById('searchBox').value;
      const response = await fetch('/contacts/search?keyword=' + keyword);
      const contacts = await response.json();
      displayContacts(contacts);
    }

    async function addContact() {
      const name = prompt("Enter contact name:");
      const phone = prompt("Enter phone number:");
      if (name && phone) {
        await fetch('/contacts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone })
        });
        fetchContacts();
      }
    }

    async function updateContact(id) {
      const name = prompt("Enter new contact name:");
      const phone = prompt("Enter new phone number:");
      if (name && phone) {
        await fetch(`/contacts/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone })
        });
        fetchContacts();
      }
    }

    async function deleteContact(id) {
      if (confirm("Are you sure you want to delete this contact?")) {
        await fetch(`/contacts/${id}`, { method: 'DELETE' });
        fetchContacts();
      }
    }

    function displayContacts(contacts) {
      const table = document.getElementById('contactsTable');
      table.innerHTML = `<tr><th>ID</th><th>Name</th><th>Phone</th><th>Actions</th></tr>`;
      contacts.forEach(contact => {
        const row = `<tr>
                    <td>${contact.id}</td>
                    <td>${contact.name}</td>
                    <td>${contact.phone}</td>
                    <td>
                        <button onclick="updateContact(${contact.id})">Edit</button>
                        <button onclick="deleteContact(${contact.id})">Delete</button>
                    </td>
                </tr>`;
        table.innerHTML += row;
      });
    }

    window.onload = fetchContacts;
  </script>
</head>
<body>
<h2>Contact List</h2>
<label for="searchBox">Search Contacts:</label>
<input type="text" id="searchBox" placeholder="Search by name or phone">
<button onclick="searchContacts()">Search</button>
<button onclick="fetchContacts()">Reset</button>
<button onclick="addContact()">Add Contact</button>

<table id="contactsTable">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Actions</th>
  </tr>
</table>
</body>
</html>
