<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>Instance List</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .spinner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 16px solid #f3f3f3;
            border-radius: 50%;
            border-top: 16px solid #3498db;
            width: 120px;
            height: 120px;
            -webkit-animation: spin 2s linear infinite;
            animation: spin 2s linear infinite;
        }
        @-webkit-keyframes spin {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div th:replace="~{layout :: header}"></div>
<main th:fragment="content">
    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Zone</th>
            <th>Status</th>
            <th>Private IPv4</th>
            <th>Public IP</th>
            <th>Actions</th>
            <th>Proxy</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="instance : ${instances}">
            <td th:text="${instance.name}"></td>
            <td th:text="${instance.zone}"></td>
            <td th:text="${instance.status}"></td>
            <td th:text="${instance.privateIP}"></td>
            <td th:text="${instance.publicIP}"></td>
            <td>
                <form th:action="@{/tools/instance/start}" method="post" style="display:inline;" class="instance-action-form">
                    <input type="hidden" name="zone" th:value="${instance.zone}">
                    <input type="hidden" name="instanceName" th:value="${instance.name}">
                    <button type="submit">Start</button>
                </form>
                <form th:action="@{/tools/instance/stop}" method="post" style="display:inline;" class="instance-action-form">
                    <input type="hidden" name="zone" th:value="${instance.zone}">
                    <input type="hidden" name="instanceName" th:value="${instance.name}">
                    <button type="submit">Stop</button>
                </form>
            </td>

            <td style="text-align: center;">
                <form th:action="@{/tools/instance/setProxy}" method="post" class="proxy-form">
                    <input type="hidden" name="instanceName" th:value="${instance.name}">
                    <input type="hidden" name="publicIP" th:value="${instance.publicIP}">
                    <input type="radio" name="proxy" th:value="${instance.name}" th:checked="${#strings.trim(instance.publicIP).equals(#strings.trim(currentProxyIP))}" th:disabled="${#strings.length(instance.publicIP) < 7}" onchange="this.form.submit()">
                </form>
            </td>

        </tr>
        <tr></tr>
        <tr></tr>
        <tr><td>
            <form th:action="@{/tools/instance/stopAll}" method="post" class="instance-action-form">
                <button type="submit">Stop All Instances</button>
            </form>
        </td></tr>
        </tbody>
    </table>

    <div class="spinner" id="spinner"></div>
</main>
<div th:replace="~{layout :: footer}"></div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var forms = document.querySelectorAll('.instance-action-form');
        var spinner = document.getElementById('spinner');

        forms.forEach(function(form) {
            form.addEventListener('submit', function() {
                spinner.style.display = 'block';
            });
        });
    });
</script>
</body>
</html>
