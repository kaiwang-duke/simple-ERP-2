<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title} ?: 'Default Title'">Default Title</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <!--
    <script th:src="@{/js/common.js}"></script>
    <script src="/js/common.js"></script>
    <script th:attr="src=@{/js/common.js}"></script>
    -->
</head>
<body>
<header th:fragment="header">
    <div class="header-content">
        <div class="left-section">
            <a th:href="@{/index}">Dashboard</a>
        </div>
        <h1 th:text="${title}">Default Title</h1>

        <div class="user-info">
            <span th:text="${userEmail}">Default User Email</span>

            <th:block th:if="${isAuthenticated}">
                &nbsp;|-| &nbsp;
                <form th:action="@{/logout}" method="post" style="display:inline;">
                  <input type="hidden" th:if="${_csrf != null}"
                         th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                  <button type="submit" style="background:none;border:none;padding:0;margin:0;color:inherit;text-decoration:underline;cursor:pointer;">
                    Logout
                  </button>
                </form>
              </th:block>
        </div>

    </div>
    <script type="text/javascript" th:src="@{/js/common.js}"></script>
</header>
<main th:fragment="content">
    <p>This is the content fragment. It should be replaced.</p>
</main>
<footer th:fragment="footer">
    <p>&copy; 2024 9Force Inc. All rights reserved 2.1</p>
</footer>

<!-- Pagination fragment for table-list views -->
<div th:fragment="pagination(page,q)">
    <ul class="pagination">
        <li th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
            th:classappend="${i == page.number} ? 'active'">
            <a th:href="@{/products/categories(page=${i},q=${q})}" th:text="${i + 1}">1</a>
        </li>
    </ul>
</div>

</body>
</html>
